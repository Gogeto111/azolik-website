<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08090c"/>
      <stop offset="50%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#08090c"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.08"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#4fd1c5"/>
    </linearGradient>
    <linearGradient id="logoGradient" x1="50%" y1="0%" x2="50%" y2="100%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="1"/>
      <stop offset="33%" stop-color="#0EA5E9" stop-opacity="1"/>
      <stop offset="66%" stop-color="#3B82F6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Background orbs -->
  <ellipse cx="1000" cy="-100" rx="300" ry="250" fill="url(#orb1)" filter="url(#blur)"/>
  <ellipse cx="-100" cy="500" rx="280" ry="220" fill="url(#orb2)" filter="url(#blur)"/>

  <defs>
    <filter id="blur">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
  </defs>

  <!-- Grid pattern -->
  <g opacity="0.02" fill="none" stroke="#fff" stroke-width="0.5">
    <rect x="0" y="0" width="1200" height="630" fill="url(#grid)"/>
  </g>
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#fff" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Logo and name -->
  <g transform="translate(120, 120)">
    <!-- Logo ring -->
    <g>
      <!-- Top segment -->
      <path d="M64 8 C33.1 8 8 33.1 8 64 C8 70.6 11.4 77 16.8 82.3 L21.5 87 C24.5 80.8 32 74.5 41.2 71.8 C48.7 69.6 56.5 69 64 69 C71.5 69 79.3 69.6 86.8 71.8 C96 74.5 103.5 80.8 106.5 87 L111.2 82.3 C116.6 77 120 70.6 120 64 C120 33.1 94.9 8 64 8 Z" fill="url(#logoGradient)" fill-opacity="1"/>
      <!-- Right segment -->
      <path d="M64 8 C94.9 8 120 33.1 120 64 C113.4 64 107 67.4 101.7 72.1 L106.5 76.8 C110.2 71.5 115.5 68 120 64 C120 94.9 94.9 120 64 120 C57.5 120 51.1 116.5 46.4 111.2 L41.7 106.5 C37 110.2 33.5 115.5 32 120 C32 94.9 57.1 69.8 64 64 Z" fill="url(#logoGradient)" fill-opacity="0.85"/>
      <!-- Bottom segment -->
      <path d="M64 120 C94.9 120 120 94.9 120 64 C113.4 57.4 107 53.9 101.7 49.2 L106.5 44.5 C110.2 49.8 115.5 53.3 120 57.1 C120 94.9 94.9 120 64 120 C70.5 120 76.9 116.5 81.6 111.2 L86.3 106.5 C91 110.2 94.5 115.5 96 120 C96 94.9 69.9 69.8 64 64 Z" fill="url(#logoGradient)" fill-opacity="0.7"/>
      <!-- Left segment -->
      <path d="M64 120 C33.1 120 8 94.9 8 64 C14.6 64 21 60.6 26.3 55.9 L21.5 51.2 C17.8 56.5 12.5 60 8 64 C8 33.1 33.1 8 64 8 C70.5 8 76.9 11.5 81.6 16.8 L76.9 21.5 C72.2 17.8 68.7 12.5 64 8 Z" fill="url(#logoGradient)" fill-opacity="0.55"/>
      <!-- Dividing lines -->
      <g stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round">
        <line x1="64" y1="8" x2="64" y2="64"/>
        <line x1="64" y1="64" x2="120" y2="64"/>
        <line x1="64" y1="64" x2="64" y2="120"/>
        <line x1="8" y1="64" x2="64" y2="64"/>
      </g>
      <!-- Center triangle -->
      <g transform="translate(64, 64)">
        <polygon points="0,-20 17.3,10 -17.3,10" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round" opacity="0.9"/>
      </g>
    </g>
    <text x="160" y="55" font-family="system-ui, sans-serif" font-weight="700" font-size="40" fill="#fff">Azolic</text>
  </g>

  <!-- Tagline -->
  <text x="120" y="240" font-family="system-ui, sans-serif" font-weight="700" font-size="56" fill="#fff" letter-spacing="-1">Your full</text>
  <text x="120" y="310" font-family="system-ui, sans-serif" font-weight="700" font-size="56" fill="url(#textGrad)" letter-spacing="-1">AI team.</text>
  <text x="120" y="380" font-family="system-ui, sans-serif" font-weight="700" font-size="56" fill="#fff" letter-spacing="-1">Day one.</text>

  <!-- Description -->
  <text x="120" y="460" font-family="system-ui, sans-serif" font-size="24" fill="rgba(255,255,255,0.55)" max-width="800">Four AI departments — Support, Sales, Marketing, Finance — working autonomously from day one.</text>

  <!-- Departments badges -->
  <g transform="translate(120, 500)">
    <g>
      <rect x="0" y="0" rx="8" width="120" height="40" fill="rgba(79,209,197,0.1)" stroke="#4fd1c5" stroke-width="1"/>
      <text x="60" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="14" fill="#4fd1c5">Support</text>
    </g>
    <g transform="translate(130, 0)">
      <rect x="0" y="0" rx="8" width="90" height="40" fill="rgba(167,139,250,0.1)" stroke="#a78bfa" stroke-width="1"/>
      <text x="45" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="14" fill="#a78bfa">Sales</text>
    </g>
    <g transform="translate(230, 0)">
      <rect x="0" y="0" rx="8" width="120" height="40" fill="rgba(251,146,60,0.1)" stroke="#fb923c" stroke-width="1"/>
      <text x="60" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="14" fill="#fb923c">Marketing</text>
    </g>
    <g transform="translate(360, 0)">
      <rect x="0" y="0" rx="8" width="100" height="40" fill="rgba(52,211,153,0.1)" stroke="#34d399" stroke-width="1"/>
      <text x="50" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="14" fill="#34d399">Finance</text>
    </g>

  </g>

  <!-- CTA -->
  <g transform="translate(120, 560)">
    <rect x="0" y="0" rx="12" width="220" height="50" fill="#f5f5f7"/>
    <text x="110" y="33" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="16" fill="#08090c">Start free trial</text>
  </g>

  <!-- Bottom text -->
  <text x="600" y="610" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="rgba(255,255,255,0.25)">azolic.ai  •  AI Departments. On Demand.</text>
</svg>